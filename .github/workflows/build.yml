name: Build Desktop
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: C:\t
    steps:
      - uses: actions/checkout@v4
      - name: Enable Windows Long Paths
        run: |
          git config --system core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
      - name: Install dependencies (bun)
        uses: oven-sh/setup-bun@v1
      - name: Install Packaging Tools
        run: |
          choco install nsis wixtoolset -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH
      - name: Install Tauri dependencies
        run: bun install
      - name: Bundle default fast French model
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $modelsDir = "src-tauri/resources/models"
          $archive = "$env:RUNNER_TEMP/canary-180m-flash.tar.gz"
          $extractDir = "$env:RUNNER_TEMP/canary-180m-flash"
          $finalDir = "$modelsDir/canary-180m-flash"
          $expectedSha256 = "6d9cfca6118b296e196eaedc1c8fa9788305a7b0f1feafdb6dc91932ab6e53f7"

          New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null
          Invoke-WebRequest -Uri "https://blob.handy.computer/canary-180m-flash.tar.gz" -OutFile $archive

          $actualSha256 = (Get-FileHash -Algorithm SHA256 -Path $archive).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "Canary Flash checksum mismatch: expected $expectedSha256, got $actualSha256"
          }

          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar -xzf $archive -C $extractDir

          if (Test-Path $finalDir) {
            Remove-Item -Recurse -Force $finalDir
          }
          Move-Item -Path "$extractDir/canary-180m-flash" -Destination $finalDir
      - name: Build App
        run: bun run tauri build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DomefaAI-Windows
          path: C:/t/release/bundle/nsis/*.exe
