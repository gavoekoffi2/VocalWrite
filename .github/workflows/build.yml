name: Build Desktop
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: C:\t
    steps:
      - uses: actions/checkout@v4
      - name: Enable Windows Long Paths
        run: |
          git config --system core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
      - name: Install dependencies (bun)
        uses: oven-sh/setup-bun@v1
      - name: Install Packaging Tools
        run: |
          choco install nsis wixtoolset -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH
      - name: Install Tauri dependencies
        run: bun install
      - name: Bundle default French Whisper Turbo model
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $modelsDir = "src-tauri/resources/models"
          $modelFile = "$modelsDir/ggml-large-v3-turbo.bin"
          $expectedSha256 = "1fc70f774d38eb169993ac391eea357ef47c88757ef72ee5943879b7e8e2bc69"

          New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null
          Invoke-WebRequest -Uri "https://blob.handy.computer/ggml-large-v3-turbo.bin" -OutFile $modelFile

          $actualSha256 = (Get-FileHash -Algorithm SHA256 -Path $modelFile).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "Whisper Turbo checksum mismatch: expected $expectedSha256, got $actualSha256"
          }
      - name: Build App
        run: bun run tauri build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DomefaAI-Windows
          path: C:/t/release/bundle/nsis/*.exe
